context:
  version: "0.2.0"

package:
  name: phonors
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/phonors/phonors-${{ version }}.tar.gz
  sha256: 75023abb30e0d874a7af24d732e8839cc07091389de34644d3853489a4d42a50

build:
  number: 1
  skip:
    - target_platform in ["linux-aarch64", "linux-ppc64le"] and "cp314t" in python
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - if: build_platform != host_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1.7,<2.0
  host:
    - python
    - pip
    - maturin >=1.7,<2.0
  run:
    - python
    - numpy

tests:
  - python:
      imports:
        - phonors
      pip_check: true

about:
  homepage: https://github.com/phonopy/phonors
  repository: https://github.com/phonopy/phonors
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Rust kernels for phonopy and phono3py
  description: |
    phonors is a Rust extension module providing the heavy numerical
    kernels used by phono3py and phonopy.  Built with maturin and
    PyO3, distributed as abi3-py310 wheels on PyPI.

extra:
  recipe-maintainers:
    - atztogo
